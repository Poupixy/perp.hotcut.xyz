services:
  frontend:
    build: .
    container_name: perp-frontend
    restart: always
    environment:
      - MAGIC_EDEN_API_KEY=${MAGIC_EDEN_API_KEY:-}
      - TENSOR_API_KEY=${TENSOR_API_KEY:-}
      - SOLSCAN_API_KEY=${SOLSCAN_API_KEY:-}
      - HELIUS_API_KEY=${HELIUS_API_KEY:-}
      - COLLECTOR_CRYPT_COLLECTION_ADDRESSES=${COLLECTOR_CRYPT_COLLECTION_ADDRESSES:-}
      - PHYGITALS_COLLECTION_ADDRESSES=${PHYGITALS_COLLECTION_ADDRESSES:-}
      - BEEZIE_COLLECTION_ADDRESSES=${BEEZIE_COLLECTION_ADDRESSES:-}
      - NFT_COLLECTION_ADDRESSES=${NFT_COLLECTION_ADDRESSES:-}
      - PERP_MARKET_SOURCES=${PERP_MARKET_SOURCES:-{"pokemon-cards":{"magicEdenSymbols":["dark_machoke_team_rocket_1st_edition","2025_pokemon_pfl_enphantasmal_flames"]},"nfl-cards":{"magicEdenSymbols":["qbc"]},"other-cards":{"magicEdenSymbols":["badhand","bonkuji","collectiblescom","phygitals","phygitals___","phygitals_staging","cards_","squidchops_pass_cards","meta_racing","relique","nub_packs","vault_runners"]}}}
      - NFT_SQLITE_DB_PATH=${NFT_SQLITE_DB_PATH:-/app/data/perp-rwa.sqlite}
      - STORE_RAW_HELIUS_JSON=${STORE_RAW_HELIUS_JSON:-false}
      - HELIUS_WEBHOOK_SECRET=${HELIUS_WEBHOOK_SECRET:-}
      - RWA_MARKET_ADMIN_SECRET=${RWA_MARKET_ADMIN_SECRET:-}
    ports:
      - "127.0.0.1:3002:3000"
    volumes:
      - perp-rwa-data:/app/data

volumes:
  perp-rwa-data:

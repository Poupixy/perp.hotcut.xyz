services:
  frontend:
    build: .
    container_name: perp-frontend
    restart: always
    environment:
      - MAGIC_EDEN_API_KEY=${MAGIC_EDEN_API_KEY:-}
      - TENSOR_API_KEY=${TENSOR_API_KEY:-}
      - SOLSCAN_API_KEY=${SOLSCAN_API_KEY:-}
      - HELIUS_API_KEY=${HELIUS_API_KEY:-}
      - PERP_MARKET_SOURCES=${PERP_MARKET_SOURCES:-{}}
    ports:
      - "127.0.0.1:3002:3000"
